<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=IE11">
    <title>CHAT - TTS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-type" content="text/html; charset=ISO-8859-1">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/jquery.min.js"></script>
    <script src="js/socket.io.js"></script>
    <script src="js/action.js"></script>
</head>

<body>
    <center>
        <h3>Usuários conectados: <span id="contador"></span></h3>
        <div class="mostrarchat" id="mostrarchat" style="display: block;"">
            <input type="text" id="user" placeholder="Escolha seu Nome" maxlength="100">
            <button id="trocar_user">Alterar</button>
            <div id="chatroom">
                <div id="chat"></div>
                <div id="status" style="bottom: 100%; "></div>
            </div>
                <input type="text" id="msg_audio" placeholder="Escreva uma mensagem" maxlength="200">
                <button type="button" id="enviar_audio">Enviar</button>
        </div>
</body>

</html>
